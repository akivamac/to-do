<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peaceful Tasks - Redirecting</title>
</head>
<body>
    <script>
        const path = window.location.pathname;
        const route = path.replace('/to-do', '').replace('/', '') || '';
        window.location.replace('/to-do/' + (route ? 'index.html?route=' + route : 'index.html'));
    </script>
</body>
</html>
